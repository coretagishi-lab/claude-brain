<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inbox">
  <title>Inbox — claude-brain</title>
  <style>
    :root {
      --bg:      #0d0d0f;
      --surface: #18181c;
      --border:  #2c2c32;
      --text:    #e8e8ed;
      --muted:   #6c6c7a;
      --accent:  #3b82f6;
      --success: #22c55e;
      --error:   #ef4444;
      --warn:    #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* hidden属性がdisplay:flexに負けないようにする（iOS Safari対策） */
    [hidden] { display: none !important; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      min-height: 100svh;
      padding:
        max(env(safe-area-inset-top),  28px)
        max(env(safe-area-inset-right), 20px)
        max(env(safe-area-inset-bottom),28px)
        max(env(safe-area-inset-left),  20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    /* ── 共通パーツ ── */
    .card {
      width: 100%; max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      display: flex; flex-direction: column; gap: 12px;
    }

    input[type="password"], input[type="text"], textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      padding: 13px 15px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }

    textarea { min-height: 150px; line-height: 1.6; resize: vertical; }

    .btn {
      width: 100%; padding: 15px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; letter-spacing: -.2px;
      transition: opacity .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active  { opacity: .8; }
    .btn:disabled{ opacity: .4; cursor: default; }
    .btn.danger  { background: var(--error); }
    .btn.ghost   {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .status {
      display: none; padding: 11px 14px;
      border-radius: 10px; font-size: 14px; font-weight: 500;
    }
    .status.ok  { display:block; background:rgba(34,197,94,.12);  color:var(--success); border:1px solid rgba(34,197,94,.3);  }
    .status.err { display:block; background:rgba(239,68,68,.12);  color:var(--error);   border:1px solid rgba(239,68,68,.3);  }
    .status.info{ display:block; background:rgba(59,130,246,.12); color:var(--accent);  border:1px solid rgba(59,130,246,.3); }

    .label {
      font-size: 12px; font-weight: 600; color: var(--muted);
      letter-spacing: .4px; text-transform: uppercase;
    }
    .hint-box {
      background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.25);
      border-radius: 10px; padding: 12px 14px;
      font-size: 13px; color: var(--warn); line-height: 1.6;
    }
    .hint-box code {
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      background: rgba(245,158,11,.15);
      padding: 1px 5px; border-radius: 4px;
    }

    /* ── セットアップ画面 ── */
    #screen-setup .logo {
      width: 100%; max-width: 480px;
      display: flex; align-items: center; gap: 14px;
    }
    .icon-lg {
      width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: grid; place-items: center; font-size: 26px;
    }
    .app-title   { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }
    .app-sub     { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── メイン画面 ── */
    #screen-app .header {
      width: 100%; max-width: 480px;
      display: flex; align-items: center; gap: 12px;
    }
    .icon-sm {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: grid; place-items: center; font-size: 20px;
    }
    .header-text { flex: 1; }
    .header-title{ font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .gear-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 17px;
      display: grid; place-items: center; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .gear-btn:active { background: var(--border); }

    /* ── 設定シート（スライドアップ） ── */
    #settings-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: flex-end;
      z-index: 100;
    }
    /* 背景タップで閉じる用ボタン（divではなくbuttonでiOS確実に反応） */
    #settings-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #settings-sheet {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px; margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 8px 20px max(env(safe-area-inset-bottom), 28px);
    }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 8px auto 20px;
    }
    .sheet-title {
      font-size: 15px; font-weight: 600;
      color: var(--muted); margin-bottom: 16px;
      letter-spacing: -.2px;
    }
    .sheet-row {
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── hint footer ── */
    .footer-hint {
      font-size: 11px; color: var(--muted); text-align: center;
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════ -->
  <!-- セットアップ画面                  -->
  <!-- ════════════════════════════════ -->
  <div id="screen-setup">
    <div class="logo">
      <div class="icon-lg">📥</div>
      <div>
        <div class="app-title">Inbox</div>
        <div class="app-sub">claude-brain — 初回セットアップ</div>
      </div>
    </div>

    <div class="card">
      <div class="label">GitHub Token</div>
      <input type="password" id="token-input"
             placeholder="ghp_... または github_pat_..."
             autocomplete="off" autocorrect="off" spellcheck="false">

      <button class="btn" id="save-btn" onclick="saveToken()">
        確認して保存
      </button>
      <div class="status" id="setup-status"></div>

      <div class="hint-box">
        <strong>トークンの作り方</strong><br>
        GitHub → Settings → Developer settings<br>
        → Fine-grained personal access tokens → New token<br>
        → Repository: <code>claude-brain</code><br>
        → Permissions → Contents: <code>Read and Write</code>
      </div>
    </div>
    <p class="footer-hint">トークンはこの端末のみに保存されます</p>
  </div>

  <!-- ════════════════════════════════ -->
  <!-- メイン画面                        -->
  <!-- ════════════════════════════════ -->
  <div id="screen-app" hidden>
    <div class="header">
      <div class="icon-sm">📥</div>
      <div class="header-text">
        <div class="header-title">Inbox</div>
        <div class="header-sub">coretagishi-lab / claude-brain</div>
      </div>
      <button class="gear-btn" onclick="openSettings()" title="設定" aria-label="設定">⚙️</button>
    </div>

    <div class="card">
      <textarea id="memo" placeholder="追加するメモを入力…"></textarea>
      <button class="btn" id="send-btn" onclick="send()">Inboxに追加</button>
      <div class="status" id="send-status"></div>
    </div>
    <p class="footer-hint">Cmd+Enter でも送信できます</p>
  </div>

  <!-- ════════════════════════════════ -->
  <!-- 設定シート                        -->
  <!-- ════════════════════════════════ -->
  <div id="settings-overlay" hidden>
    <!-- 背景タップで閉じる -->
    <button id="settings-backdrop" onclick="closeSettings()" aria-label="閉じる"></button>
    <!-- シート本体（クリックがbackdropに伝播しないようstopPropagation） -->
    <div id="settings-sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="sheet-title">⚙️ 設定</div>
      <div class="sheet-row">
        <button class="btn danger" onclick="resetToken()">
          🔑 トークンをリセット
        </button>
        <button class="btn ghost" onclick="closeSettings()">
          キャンセル
        </button>
      </div>
    </div>
  </div>

  <script>
    // ── 定数 ────────────────────────────────────────────
    const OWNER       = 'coretagishi-lab';
    const REPO        = 'claude-brain';
    const FILE_PATH   = 'Inbox/inbox.md';
    const API         = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
    const STORAGE_KEY = 'cb_github_token';

    // ── トークン管理 ─────────────────────────────────────
    const getToken   = () => localStorage.getItem(STORAGE_KEY) || '';
    const clearToken = () => localStorage.removeItem(STORAGE_KEY);

    // ── 画面切り替え ─────────────────────────────────────
    function showSetup() {
      document.getElementById('screen-setup').hidden = false;
      document.getElementById('screen-app').hidden   = true;
      document.getElementById('token-input').value   = '';
      setStatus('setup-status', '', '');
    }

    function showApp() {
      document.getElementById('screen-setup').hidden = true;
      document.getElementById('screen-app').hidden   = false;
      setTimeout(() => document.getElementById('memo').focus(), 100);
    }

    // ── 設定シート ───────────────────────────────────────
    function openSettings() {
      document.getElementById('settings-overlay').hidden = false;
    }
    function closeSettings() {
      document.getElementById('settings-overlay').hidden = true;
    }
    function resetToken() {
      closeSettings();
      clearToken();
      showSetup();
    }

    // ── ステータス表示 ───────────────────────────────────
    function setStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className   = 'status' + (type ? ' ' + type : '');
    }

    // ── トークン保存（テスト付き） ────────────────────────
    async function saveToken() {
      const token = document.getElementById('token-input').value.trim();
      if (!token) return;

      const btn = document.getElementById('save-btn');
      btn.disabled    = true;
      btn.textContent = '確認中…';
      setStatus('setup-status', '', '');

      try {
        const res = await fetch(API, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json',
          }
        });

        if (res.status === 401) throw new Error('トークンが無効です');
        if (res.status === 403) throw new Error('権限不足 — Contents: Read & Write が必要です');
        if (res.status !== 200 && res.status !== 404)
          throw new Error(`接続エラー: ${res.status}`);

        localStorage.setItem(STORAGE_KEY, token);
        setStatus('setup-status', '✅ 接続確認OK！', 'ok');
        setTimeout(showApp, 600);

      } catch (e) {
        setStatus('setup-status', '❌ ' + e.message, 'err');
      } finally {
        btn.disabled    = false;
        btn.textContent = '確認して保存';
      }
    }

    // ── ユーティリティ ───────────────────────────────────
    function b64Encode(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = '';
      for (const b of bytes) bin += String.fromCharCode(b);
      return btoa(bin);
    }
    function b64Decode(b64) {
      const bin   = atob(b64.replace(/\s/g, ''));
      const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }
    function timestamp() {
      const d = new Date(), p = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    // ── 送信処理 ─────────────────────────────────────────
    async function send() {
      const memo  = document.getElementById('memo').value.trim();
      const token = getToken();
      if (!memo || !token) return;

      const btn = document.getElementById('send-btn');
      btn.disabled    = true;
      btn.textContent = '送信中…';
      setStatus('send-status', '', '');

      const headers = {
        'Authorization': `token ${token}`,
        'Accept':        'application/vnd.github.v3+json',
        'Content-Type':  'application/json',
      };

      try {
        // 現在のファイルを取得
        const getRes = await fetch(API, { headers });

        let oldContent = '', sha = null;
        if (getRes.ok) {
          const data = await getRes.json();
          oldContent  = b64Decode(data.content);
          sha         = data.sha;
        } else if (getRes.status !== 404) {
          if (getRes.status === 401) { clearToken(); showSetup(); return; }
          throw new Error(`取得失敗: ${getRes.status}`);
        }

        const base    = oldContent.replace(/\n+$/, '');
        const updated = (base || '# Inbox') + `\n- ${timestamp()} ${memo}`;

        const putRes = await fetch(API, {
          method: 'PUT', headers,
          body: JSON.stringify({
            message: 'Add inbox entry via iPhone',
            content: b64Encode(updated),
            ...(sha ? { sha } : {}),
          }),
        });

        if (!putRes.ok) {
          if (putRes.status === 401) { clearToken(); showSetup(); return; }
          const err = await putRes.json().catch(() => ({}));
          throw new Error(err.message || `更新失敗: ${putRes.status}`);
        }

        setStatus('send-status', '✅ Inboxに追加しました！', 'ok');
        document.getElementById('memo').value = '';
        document.getElementById('memo').focus();

      } catch (e) {
        setStatus('send-status', '❌ ' + e.message, 'err');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Inboxに追加';
      }
    }

    // Cmd+Enter / Ctrl+Enter で送信
    document.getElementById('memo').addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') send();
    });

    // Enterキーでトークン保存
    document.getElementById('token-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveToken();
    });

    // ── 起動 ─────────────────────────────────────────────
    getToken() ? showApp() : showSetup();
  </script>

</body>
</html>
